name: Claude Chat

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      # 1. Primero, descargar el código
      - uses: actions/checkout@v4

      # 2. Instalar Node.js para que npm funcione
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa la versión de Node que necesites

      # 3. Instalar dependencias (el comando real, no el del curso)
      - name: Install dependencies
        run: npm install

      # 4. Iniciar el servidor en segundo plano
      - name: Start dev server
        run: npm run dev &

      # 5. Ejecutar Claude
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          custom_instructions: |
            The project dependencies are installed.
            The server is running at localhost:3000.
            Use the mcp__playwright tools to launch a browser and interact with the app.
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "-y",
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "localhost:3000;cdn.tailwindcss.com;esm.sh"
                  ]
                }
              }
            }
          allowed_tools: "Bash(npm:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click"